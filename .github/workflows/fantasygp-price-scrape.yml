name: FantasyGP Price Scrape

on:
  schedule:
    # Run every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate FantasyGP secrets
        env:
          FANTASYGP_USERNAME: ${{ secrets.FANTASYGP_USERNAME }}
          FANTASYGP_PASSWORD: ${{ secrets.FANTASYGP_PASSWORD }}
        run: |
          if [ -z "$FANTASYGP_USERNAME" ] || [ -z "$FANTASYGP_PASSWORD" ]; then
            echo "Missing required secrets: FANTASYGP_USERNAME and/or FANTASYGP_PASSWORD"
            exit 1
          fi

      - name: Create debug directory
        run: mkdir -p .artifacts

      - name: Scrape FantasyGP prices
        env:
          FANTASYGP_USERNAME: ${{ secrets.FANTASYGP_USERNAME }}
          FANTASYGP_PASSWORD: ${{ secrets.FANTASYGP_PASSWORD }}
          FANTASYGP_TARGET_URL: https://fantasygp.com/drivers-cars/
          FANTASYGP_AJAX_ACTIONS: getdriversandcars,allDriversAndCars,driversandcars
          FANTASYGP_DEBUG_HTML_PATH: .artifacts/fantasygp_last_failed_page.html
        run: |
          set -e
          for attempt in 1 2 3; do
            echo "FantasyGP scrape attempt ${attempt}/3"
            if python -m src.data_prep.get_fantasygp_prices; then
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              sleep 20
            fi
          done
          echo "FantasyGP price scrape failed after 3 attempts"
          exit 1

      - name: Upload scrape debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fantasygp-scrape-debug
          path: .artifacts/
          if-no-files-found: ignore

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/fantasygp*prices*.csv
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update FantasyGP driver and constructor prices - $(date +%Y-%m-%d)"
            git push
          fi

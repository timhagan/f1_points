name: FantasyGP Price Scrape

on:
  schedule:
    # Run every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Scrape FantasyGP prices
        env:
          FANTASYGP_USERNAME: ${{ secrets.FANTASYGP_USERNAME }}
          FANTASYGP_PASSWORD: ${{ secrets.FANTASYGP_PASSWORD }}
          FANTASYGP_TARGET_URL: https://fantasygp.com/drivers-cars/
        run: python -m src.data_prep.get_fantasygp_prices

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/fantasygp*prices*.csv
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update FantasyGP driver and constructor prices - $(date +%Y-%m-%d)"
            git push
          fi
